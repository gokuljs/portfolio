<svg width="560" height="340" viewBox="0 0 560 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="560" height="340" fill="#0f1117" rx="12"/>

  <!-- Axes -->
  <line x1="60" y1="280" x2="520" y2="280" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="60" y1="280" x2="60" y2="30" stroke="#4b5563" stroke-width="1.5"/>

  <!-- X axis label -->
  <text x="290" y="320" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="13">Term Frequency (tf)</text>
  <!-- Y axis label -->
  <text x="16" y="160" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="13" transform="rotate(-90, 16, 160)">Score</text>

  <!-- X tick labels: 1, 2, 5, 10, 20 -->
  <!-- map tf to x: tf=1’100, tf=2’165, tf=5’280, tf=10’395, tf=20’510 -->
  <text x="100" y="298" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">1</text>
  <text x="165" y="298" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">2</text>
  <text x="280" y="298" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">5</text>
  <text x="395" y="298" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">10</text>
  <text x="510" y="298" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">20</text>

  <!-- Y tick labels -->
  <!-- map score to y: score=0’280, score=5’175, score=10’70, score=20’... scale: 1 unit = 21px -->
  <text x="50" y="284" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="11">0</text>
  <text x="50" y="242" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="11">2</text>
  <text x="50" y="200" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="11">4</text>
  <text x="50" y="158" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="11">6</text>
  <text x="50" y="116" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="11">8</text>
  <text x="50" y="74" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="11">10</text>

  <!-- Grid lines -->
  <line x1="60" y1="242" x2="520" y2="242" stroke="#1f2937" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="200" x2="520" y2="200" stroke="#1f2937" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="158" x2="520" y2="158" stroke="#1f2937" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="116" x2="520" y2="116" stroke="#1f2937" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="74" x2="520" y2="74" stroke="#1f2937" stroke-width="1" stroke-dasharray="4,4"/>

  <!--
    x mapping: tf -> x
    tf=0 -> 60, tf=20 -> 510
    x = 60 + (tf/20)*450

    y mapping: score -> y
    score=0 -> 280, score=10 -> 70 (capped)
    y = 280 - (score/10)*210
    
    Basic TF points (tf, score=tf): capped at 10
    BM25 TF points (tf, bm25): k1=1.5, bm25 = tf*(k1+1)/(tf+k1)
  -->

  <!-- Basic TF line (red) - linear, goes from (0,0) to (10,10), then continues to (20,20) but capped -->
  <!-- Points: tf=0->x=60,y=280; tf=5->x=172,y=175; tf=10->x=285,y=70 (score=10, max); tf=20 stays at y=70 but score=20 off chart -->
  <!-- Actually let's show it going off chart: tf=0->60,280; tf=3->127.5,217; tf=10->285,70 -->
  <!-- Recalc: x=60+tf/20*450, y=280-score/10*210 but min y=40 -->
  <!-- tf=0: x=60, score=0, y=280 -->
  <!-- tf=2: x=105, score=2, y=238 -->
  <!-- tf=5: x=172, score=5, y=175 -->
  <!-- tf=10: x=285, score=10, y=70 -->
  <!-- tf=13.3: x=360, score=13.3, y=40 (hits top) -->
  <polyline
    points="60,280 105,238 172,175 285,70 360,40"
    fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow to indicate it keeps going -->
  <text x="365" y="36" fill="#f87171" font-family="monospace" font-size="12">...</text>

  <!-- BM25 TF line (green) - saturating -->
  <!-- k1=1.5, bm25_tf = tf*(1.5+1)/(tf+1.5) = tf*2.5/(tf+1.5) -->
  <!-- tf=0: 0, tf=1: 1.0, tf=2: 1.43, tf=3: 1.67, tf=5: 1.92, tf=8: 2.11, tf=10: 2.17, tf=15: 2.27, tf=20: 2.33 -->
  <!-- y = 280 - (score/10)*210 -->
  <!-- tf=0: x=60, y=280 -->
  <!-- tf=1: x=82.5, bm25=1.0, y=259 -->
  <!-- tf=2: x=105, bm25=1.43, y=250 -->
  <!-- tf=3: x=127.5, bm25=1.67, y=245 -->
  <!-- tf=5: x=172, bm25=1.92, y=240 -->
  <!-- tf=8: x=240, bm25=2.11, y=236 -->
  <!-- tf=10: x=285, bm25=2.17, y=234 -->
  <!-- tf=15: x=397, bm25=2.27, y=232 -->
  <!-- tf=20: x=510, bm25=2.33, y=231 -->
  <polyline
    points="60,280 82,259 105,250 127,245 172,240 240,236 285,234 397,232 510,231"
    fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Asymptote line (dashed green) at score = k1+1 = 2.5, y=280-(2.5/10)*210=227.5 -->
  <line x1="60" y1="227" x2="520" y2="227" stroke="#4ade80" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <text x="524" y="231" fill="#4ade80" font-family="monospace" font-size="10" opacity="0.6">k1+1</text>

  <!-- Legend -->
  <rect x="320" y="80" width="180" height="64" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <line x1="333" y1="100" x2="360" y2="100" stroke="#f87171" stroke-width="2.5"/>
  <text x="368" y="104" fill="#e2e8f0" font-family="monospace" font-size="12">Basic TF (linear)</text>
  <line x1="333" y1="124" x2="360" y2="124" stroke="#4ade80" stroke-width="2.5"/>
  <text x="368" y="128" fill="#e2e8f0" font-family="monospace" font-size="12">BM25 TF (k1=1.5)</text>
</svg>
